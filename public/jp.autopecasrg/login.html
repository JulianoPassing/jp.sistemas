<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JP Auto Peças RG — Login</title>
  <link rel="icon" type="image/png" href="https://i.imgur.com/TwZLW6a.png" />
  <meta name="theme-color" content="#002f4b" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="../style-sistema.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="sistema-padrao apm-layout">
  <header class="sistema-header" style="position:relative">
    <div class="header-content">
      <a href="/" class="logo" style="display:flex;align-items:center;gap:0.75rem;text-decoration:none;color:#fff;">
        <img src="https://i.imgur.com/6N82fk2.png" alt="JP Sistemas" width="120" height="48" style="height:2.5rem;width:auto;object-fit:contain;" />
        <span style="display:flex;flex-direction:column;line-height:1.15;text-align:left;">
          <span style="font-size:0.68rem;opacity:0.9">JP Sistemas</span>
          <span style="font-weight:700">Auto Peças RG</span>
        </span>
      </a>
      <nav>
        <a href="/" class="nav-link"><i class="fas fa-home"></i> Site</a>
      </nav>
    </div>
  </header>
  <main class="sistema-main apm-grow apm-login-main">
    <div class="apm-login-wrap" style="min-height:auto;padding:2rem 1rem">
      <div class="apm-login-card">
        <h1 style="display:flex;align-items:center;gap:0.5rem;margin-top:0">
          <i class="fas fa-lock" style="color:var(--accent-teal)"></i> Acesso
        </h1>
        <p>Entre com seu usuário e senha do módulo.</p>
        <div id="err" class="msg err" style="display:none;"></div>
        <form id="f">
          <div class="form-group">
            <label for="u">Usuário</label>
            <input id="u" name="username" autocomplete="username" required />
          </div>
          <div class="form-group">
            <label for="p">Senha</label>
            <input id="p" name="password" type="password" autocomplete="current-password" required />
          </div>
          <button type="submit" id="btn">Entrar</button>
        </form>
      </div>
    </div>
  </main>
  <footer class="apm-footer">
    <div class="sistema-container apm-footer-inner">
      <p class="apm-footer-copy" style="margin:0">© <span id="y"></span> JP Sistemas · <a href="/">jp-sistemas.com</a></p>
    </div>
  </footer>
  <script>
    document.getElementById('y').textContent = new Date().getFullYear();
    (async function () {
      const s = await fetch('/api/autopecasrg/session', { credentials: 'include' }).then((r) => r.json());
      if (s.authenticated) window.location.href = 'dashboard.html';
    })();
    const f = document.getElementById('f');
    const err = document.getElementById('err');
    const btn = document.getElementById('btn');
    f.addEventListener('submit', async (e) => {
      e.preventDefault();
      err.style.display = 'none';
      btn.disabled = true;
      try {
        const r = await fetch('/api/autopecasrg/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({
            username: document.getElementById('u').value.trim(),
            password: document.getElementById('p').value
          })
        });
        const d = await r.json();
        if (r.ok && d.success) {
          window.location.href = 'dashboard.html';
        } else {
          err.textContent = d.message || 'Falha no login.';
          err.style.display = 'block';
        }
      } catch {
        err.textContent = 'Erro de rede.';
        err.style.display = 'block';
      }
      btn.disabled = false;
    });
  </script>
  <style>
    .apm-login-main { display: flex; align-items: center; justify-content: center; }
  </style>
</body>
</html>
